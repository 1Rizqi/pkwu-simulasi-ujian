                explanation: 'Berdasarkan Halaman 4 & 5 materi PDF:\n- Benda Pakai: Mengutamakan fungsi praktisnya. Contoh: Pot tanaman dari ban bekas / botol plastik.\n- Benda Hias: Lebih menonjolkan keindahan daripada fungsi pakai. Contoh: Miniatur kapal dari limbah logam / kaleng.'
            }
        ];

        function App() {
            const [currentIdx, setCurrentIdx] = useState(0);
            const [answers, setAnswers] = useState({}); 
            const [graded, setGraded] = useState({}); 
            const [showClue, setShowClue] = useState({});
            const [scoreView, setScoreView] = useState(false);

            const handleOptionSelect = (qId, optionIdx) => {
                if (graded[qId]) return; 
                setAnswers(prev => ({ ...prev, [qId]: optionIdx }));
            };

            const handleEssayInput = (qId, text) => {
                if (graded[qId]) return;
                setAnswers(prev => ({ ...prev, [qId]: text }));
            };

            const toggleClue = (qId) => {
                setShowClue(prev => ({ ...prev, [qId]: !prev[qId] }));
            };

            const handleGrading = (qId) => {
                if (answers[qId] === undefined || answers[qId] === '') {
                    alert('Silakan pilih atau isi jawaban terlebih dahulu sebelum mengoreksi.');
                    return;
                }
                setGraded(prev => ({ ...prev, [qId]: true }));
            };

            const calculateScore = () => {
                let correct = 0;
                let totalMCQ = 40; // Pasti 40 soal
                
                QUESTIONS.forEach(q => {
                    if (q.type === 'mcq' && graded[q.id] && answers[q.id] === q.answer) {
                        correct++;
                    }
                });
                return { correct, score: Math.round((correct / totalMCQ) * 100) || 0, totalMCQ };
            };

            const resetExam = () => {
                if (window.confirm('Apakah Anda ingin mengulang seluruh simulasi dari awal? Semua progres akan hilang.')) {
                    setAnswers({});
                    setGraded({});
                    setShowClue({});
                    setCurrentIdx(0);
                    setScoreView(false);
                }
            };

            const q = QUESTIONS[currentIdx];
            const isEssay = q.type === 'essay';
            const { correct, score, totalMCQ } = calculateScore();
            const totalAnswered = Object.keys(answers).length;

            return (
                <div className="min-h-screen flex flex-col antialiased">
                    
                    {/* HEADER PAPER-THEME */}
                    <header className="bg-[#FBFaf8] border-b border-[#E0DDD4] sticky top-0 z-20 px-4 py-3.5 sm:px-8 flex flex-wrap justify-between items-center gap-4">
                        <div className="flex items-center gap-3">
                            <div className="text-[#899481]">
                                <IconLeaf />
                            </div>
                            <div>
                                <h1 className="font-semibold text-[#413F39] text-sm sm:text-base flex items-center gap-2">
                                    Simulasi Ujian PKWU 
                                    <span className="text-[10px] bg-[#F2F4F0] text-[#737C6C] px-2 py-0.5 rounded border border-[#DCE0D9] tracking-widest font-bold">FOKUS MODE</span>
                                </h1>
                                <p className="text-xs text-[#8C8981] mt-0.5">SMAN 1 Belitang • Semester Genap 2025/2026</p>
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 flex flex-col lg:flex-row overflow-hidden max-w-7xl mx-auto w-full">
                        
                        {/* PANEL KIRI: AREA UTAMA SOAL */}
                        <main className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-10 flex flex-col">
                            <div className="w-full max-w-3xl mx-auto space-y-8">
                                
                                {/* PROGRESS BAR SOFT */}
                                <div className="space-y-2">
                                    <div className="flex justify-between items-center text-[11px] uppercase tracking-wider font-semibold text-[#8C8981]">
                                        <span>Progres Belajar</span>
                                        <span className="text-[#413F39]">
                                            {totalAnswered} / {QUESTIONS.length}
                                        </span>
                                    </div>
                                    <div className="h-1.5 w-full bg-[#E0DDD4] rounded-full overflow-hidden">
                                        <div 
                                            className="h-full bg-[#899481] transition-all duration-500 ease-out rounded-full"
                                            style={{ width: `${(totalAnswered / QUESTIONS.length) * 100}%` }}
                                        ></div>
                                    </div>
                                </div>

                                {/* CARD SOAL */}
                                <div className="bg-[#FBFaf8] rounded-xl border border-[#E0DDD4] p-6 sm:p-10 shadow-sm relative transition-all duration-300">
                                    
                                    <div className="flex flex-wrap items-center gap-2 mb-6">
                                        <span className="text-[10px] font-bold text-[#737C6C] bg-[#F2F4F0] px-3 py-1 rounded-sm border border-[#DCE0D9] uppercase tracking-wider">
                                            {q.materi}
                                        </span>
                                        <span className="text-[10px] font-bold text-[#8C8981] border border-[#E0DDD4] px-3 py-1 rounded-sm uppercase tracking-wider">
                                            Level {q.level}
                                        </span>
                                    </div>

                                    {/* PERTANYAAN DENGAN FONT SERIF */}
                                    <div className="flex gap-4 mb-8 items-start">
                                        <div className="text-[#8C8981] font-serif font-bold text-lg pt-1 shrink-0 w-6">
                                            {q.id}.
                                        </div>
                                        <h2 className="text-[1.05rem] sm:text-[1.15rem] font-serif font-medium text-[#413F39] leading-relaxed pt-1">
                                            {q.question}
                                        </h2>
                                    </div>

                                    {/* OPSI JAWABAN (DESAIN SUBTLE/HALUS) */}
                                    <div className="space-y-3 ml-10 pl-0">
                                        {isEssay ? (
                                            <textarea 
                                                className="w-full bg-[#EFECE5] text-[#413F39] border border-[#E0DDD4] rounded-md p-4 focus:border-[#899481] focus:ring-1 focus:ring-[#899481] outline-none transition resize-y min-h-[160px] text-sm leading-relaxed"
                                                placeholder="Ketik jawaban urain Anda secara rinci..."
                                                value={answers[q.id] || ''}
                                                onChange={(e) => handleEssayInput(q.id, e.target.value)}
                                                disabled={graded[q.id]}
                                            />
                                        ) : (
                                            q.options.map((opt, idx) => {
                                                const isSelected = answers[q.id] === idx;
                                                const isGraded = graded[q.id];
                                                const isCorrectAnswer = idx === q.answer;

                                                // LOGIKA PEWARNAAN YANG SANGAT HALUS (Sesuai Permintaan)
                                                let boxClass = "bg-[#FBFaf8] border-[#E0DDD4] text-[#413F39] hover:bg-[#F2F4F0]";
                                                let labelClass = "text-[#8C8981]";

                                                if (!isGraded) {
                                                    if (isSelected) {
                                                        boxClass = "bg-[#F2F4F0] border-[#899481] text-[#2C2B27]"; // Sage light
                                                        labelClass = "text-[#737C6C] font-bold";
                                                    }
                                                } else {
                                                    if (isSelected && isCorrectAnswer) {
                                                        boxClass = "bg-[#F0F5F0] border-[#8FA68F] text-[#2C2B27]"; // Hijau kalem
                                                        labelClass = "text-[#5B705B] font-bold";
                                                    } else if (isSelected && !isCorrectAnswer) {
                                                        boxClass = "bg-[#FAF0F0] border-[#C49797] text-[#422C2C]"; // Merah bata pucat
                                                        labelClass = "text-[#9E6E6E] font-bold";
                                                    } else if (!isSelected && isCorrectAnswer) {
                                                        // Jawaban yang benar tetapi tidak dipilih
                                                        boxClass = "bg-transparent border-[#8FA68F] border-dashed text-[#5B705B]";
                                                    } else {
                                                        // Jawaban lain yang salah dan tidak dipilih
                                                        boxClass = "bg-transparent border-[#E0DDD4] text-[#A3A096] opacity-60";
                                                    }
                                                }

                                                return (
                                                    <button
                                                        key={idx}
                                                        onClick={() => handleOptionSelect(q.id, idx)}
                                                        disabled={isGraded}
                                                        className={`w-full text-left p-3.5 rounded-md border transition duration-200 flex gap-4 items-start ${boxClass} ${isGraded ? 'cursor-default' : 'cursor-pointer'}`}
                                                    >
                                                        <div className={`mt-0.5 text-sm transition-colors ${labelClass}`}>
                                                            {String.fromCharCode(65 + idx)}.
                                                        </div>
                                                        <span className="text-sm leading-relaxed">{opt}</span>
                                                    </button>
                                                )
                                            })
                                        )}
                                    </div>

                                    {/* PEMBAHASAN MUNCUL SETELAH KOREKSI */}
                                    {graded[q.id] && (
                                        <div className="mt-8 pt-6 border-t border-[#E0DDD4] fade-in">
                                            <div className="flex gap-2 items-center mb-3 text-[11px] uppercase tracking-widest font-bold text-[#8C8981]">
                                                Kunci Pembahasan
                                            </div>
                                            <div className="p-4 bg-[#EFECE5] rounded-md text-sm text-[#413F39] leading-relaxed whitespace-pre-line border border-[#E0DDD4]">
                                                {q.explanation}
                                            </div>
                                        </div>
                                    )}

                                    {/* TOMBOL AKSI: PETUNJUK & KOREKSI */}
                                    <div className="mt-8 pt-6 border-t border-[#E0DDD4] flex flex-wrap gap-3">
                                        <button
                                            onClick={() => toggleClue(q.id)}
                                            className="flex items-center gap-1.5 px-4 py-2 rounded text-xs font-semibold text-[#737C6C] bg-transparent border border-[#DCE0D9] hover:bg-[#F2F4F0] transition"
                                        >
                                            <IconHelp /> {showClue[q.id] ? 'Tutup Petunjuk' : 'Petunjuk Logika'}
                                        </button>

                                        {!graded[q.id] && (
                                            <button
                                                onClick={() => handleGrading(q.id)}
                                                className="flex items-center gap-1.5 px-5 py-2 rounded text-xs font-semibold text-white bg-[#899481] hover:bg-[#737C6C] transition shadow-sm ml-auto"
                                            >
                                                Koreksi Jawaban
                                            </button>
                                        )}
                                    </div>

                                    {/* KOTAK PETUNJUK */}
                                    {showClue[q.id] && !graded[q.id] && (
                                        <div className="mt-4 p-4 bg-[#FBFaf8] border border-dashed border-[#DCE0D9] rounded-md flex gap-3 text-sm text-[#413F39] fade-in">
                                            <span className="text-[#899481] text-lg">✦</span>
                                            <div className="leading-relaxed">
                                                {q.clue}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* NAVIGASI BAWAH */}
                                <div className="flex justify-between items-center py-2">
                                    <button
                                        disabled={currentIdx === 0}
                                        onClick={() => setCurrentIdx(c => Math.max(0, c - 1))}
                                        className="flex items-center gap-2 text-[11px] uppercase font-bold tracking-wider text-[#8C8981] hover:text-[#413F39] disabled:opacity-30 px-3 py-2 transition"
                                    >
                                        <IconChevronLeft /> Sebelum
                                    </button>

                                    <button 
                                        onClick={() => setScoreView(true)}
                                        className="text-[11px] uppercase font-bold tracking-wider text-[#737C6C] hover:text-[#413F39] border-b border-[#DCE0D9] hover:border-[#737C6C] transition pb-0.5"
                                    >
                                        Lihat Rekap
                                    </button>

                                    <button
                                        disabled={currentIdx === QUESTIONS.length - 1}
                                        onClick={() => setCurrentIdx(c => Math.min(QUESTIONS.length - 1, c + 1))}
                                        className="flex items-center gap-2 text-[11px] uppercase font-bold tracking-wider text-[#8C8981] hover:text-[#413F39] disabled:opacity-30 px-3 py-2 transition"
                                    >
                                        Lanjut <IconChevronRight />
                                    </button>
                                </div>
                            </div>
                        </main>

                        {/* PANEL KANAN: NAVIGASI GRID (MINIMALIS) */}
                        <aside className="w-full lg:w-[300px] bg-[#FBFaf8] border-t lg:border-t-0 lg:border-l border-[#E0DDD4] p-6 flex flex-col shrink-0 lg:h-[calc(100vh-60px)] overflow-y-auto">
                            <div className="mb-8">
                                <h3 className="font-semibold text-[#413F39] text-sm mb-1">Indikator Pengerjaan</h3>
                                <p className="text-xs text-[#8C8981]">Lompat ke nomor soal spesifik.</p>
                            </div>

                            {/* GRID PILIHAN GANDA */}
                            <div className="mb-8">
                                <h4 className="text-[10px] font-bold text-[#8C8981] uppercase tracking-widest mb-3 border-b border-[#E0DDD4] pb-2">Pilihan Ganda</h4>
                                <div className="grid grid-cols-5 gap-2.5">
                                    {QUESTIONS.filter(q => q.type === 'mcq').map((item, idx) => {
                                        const isAnswered = answers[item.id] !== undefined;
                                        const isGraded = graded[item.id];
                                        const isCorrect = isGraded && answers[item.id] === item.answer;
                                        const isCurrent = currentIdx === QUESTIONS.findIndex(q => q.id === item.id);
                                        
                                        let btnClass = "h-8 rounded-[4px] text-[11px] font-semibold border flex items-center justify-center transition-colors ";
                                        
                                        if (isCurrent) {
                                            btnClass += "ring-2 ring-[#899481] ring-offset-1 ring-offset-[#FBFaf8] ";
                                        }

                                        if (isGraded) {
                                            btnClass += isCorrect 
                                                ? "bg-[#8FA68F] text-white border-[#8FA68F]" 
                                                : "bg-[#C49797] text-white border-[#C49797]";
                                        } else if (isAnswered) {
                                            btnClass += "bg-[#F2F4F0] text-[#737C6C] border-[#DCE0D9]";
                                        } else {
                                            btnClass += "bg-transparent text-[#A3A096] border-[#E0DDD4] hover:bg-[#EFECE5]";
                                        }

                                        return (
                                            <button 
                                                key={item.id}
                                                onClick={() => setCurrentIdx(QUESTIONS.findIndex(q => q.id === item.id))}
                                                className={btnClass}
                                            >
                                                {item.id}
                                            </button>
                                        )
                                    })}
                                </div>
                            </div>

                            {/* GRID ESSAY */}
                            <div className="mb-auto">
                                <h4 className="text-[10px] font-bold text-[#8C8981] uppercase tracking-widest mb-3 border-b border-[#E0DDD4] pb-2">Uraian</h4>
                                <div className="grid grid-cols-5 gap-2.5">
                                    {QUESTIONS.filter(q => q.type === 'essay').map((item, idx) => {
                                        const isAnswered = answers[item.id] !== undefined && answers[item.id].trim() !== '';
                                        const isGraded = graded[item.id];
                                        const isCurrent = currentIdx === QUESTIONS.findIndex(q => q.id === item.id);
                                        
                                        let btnClass = "h-8 rounded-[4px] text-[11px] font-semibold border flex items-center justify-center transition-colors ";
                                        
                                        if (isCurrent) {
                                            btnClass += "ring-2 ring-[#899481] ring-offset-1 ring-offset-[#FBFaf8] ";
                                        }

                                        if (isGraded) {
                                            btnClass += "bg-[#737C6C] text-white border-[#737C6C]"; 
                                        } else if (isAnswered) {
                                            btnClass += "bg-[#F2F4F0] text-[#737C6C] border-[#DCE0D9]";
                                        } else {
                                            btnClass += "bg-transparent text-[#A3A096] border-[#E0DDD4] hover:bg-[#EFECE5]";
                                        }

                                        return (
                                            <button 
                                                key={item.id}
                                                onClick={() => setCurrentIdx(QUESTIONS.findIndex(q => q.id === item.id))}
                                                className={btnClass}
                                            >
                                                {item.id}
                                            </button>
                                        )
                                    })}
                                </div>
                            </div>

                            <div className="pt-6 mt-6">
                                <button
                                    onClick={resetExam}
                                    className="w-full flex items-center justify-center gap-2 bg-transparent border border-[#E0DDD4] text-[#8C8981] hover:text-[#413F39] hover:bg-[#EFECE5] font-semibold text-[11px] py-3 rounded uppercase tracking-wider transition"
                                >
                                    <IconRefresh /> Ulangi Sesi
                                </button>
                            </div>
                        </aside>
                    </div>

                    {/* MODAL REKAPITULASI */}
                    {scoreView && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#413F39]/40 backdrop-blur-sm fade-in">
                            <div className="bg-[#FBFaf8] border border-[#E0DDD4] p-8 rounded-lg max-w-sm w-full text-center space-y-6 shadow-2xl">
                                
                                <div>
                                    <h2 className="text-xl font-serif font-bold text-[#413F39]">Rekapitulasi Belajar</h2>
                                    <p className="text-[#8C8981] text-xs mt-1">Hanya opsi yang telah dikoreksi yang masuk perhitungan.</p>
                                </div>

                                <div className="bg-[#EFECE5] p-6 rounded-md border border-[#E0DDD4]">
                                    <span className="text-[10px] font-bold text-[#8C8981] uppercase tracking-widest">Akurasi Pilihan Ganda</span>
                                    <div className="text-5xl font-serif font-bold text-[#737C6C] mt-2 mb-2">
                                        {score} <span className="text-lg text-[#8C8981] font-medium font-sans">/ 100</span>
                                    </div>
                                    <p className="text-xs text-[#8C8981]">
                                        Benar <strong className="text-[#413F39]">{correct}</strong> dari <strong className="text-[#413F39]">{totalMCQ}</strong> PG
                                    </p>
                                </div>

                                <div className="text-xs text-[#8C8981] text-left leading-relaxed">
                                    Soal uraian dinilai mandiri menggunakan kunci rubrik. Harap sesuaikan poin Anda secara deskriptif.
                                </div>

                                <div className="pt-2">
                                    <button
                                        onClick={() => setScoreView(false)}
                                        className="w-full bg-[#899481] hover:bg-[#737C6C] text-white font-semibold text-xs py-3 rounded-md uppercase tracking-wider transition"
                                    >
                                        Tutup Rekap
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
